<style>
  /* ── Article body typography ──────────────────────────────────────────────── */
  .article-body { color: #cbd5e1; font-size: 1rem; line-height: 1.85; }
  .article-body > * + * { margin-top: 1.25rem; }

  .article-body h1,.article-body h2,.article-body h3,
  .article-body h4,.article-body h5 {
    color: #f1f5f9; font-weight: 700; margin-top: 2rem; margin-bottom: .75rem;
  }
  .article-body h2 { font-size: 1.35rem; border-bottom: 1px solid #334155; padding-bottom: .5rem; }
  .article-body h3 { font-size: 1.15rem; }
  .article-body p  { margin: .9rem 0; }
  .article-body strong { color: #f1f5f9; }
  .article-body a  { color: #60a5fa; text-decoration: underline; text-underline-offset: 3px; }
  .article-body a:hover { color: #93c5fd; }

  .article-body ul,.article-body ol { padding-left: 1.5rem; margin: .75rem 0; }
  .article-body ul { list-style: disc; }
  .article-body ol { list-style: decimal; }
  .article-body li { margin: .35rem 0; }

  .article-body blockquote {
    border-left: 3px solid #3b82f6; padding: .75rem 1.25rem;
    background: #1e293b; border-radius: 0 8px 8px 0; margin: 1.25rem 0;
    color: #94a3b8;
  }

  .article-body img {
    border-radius: 10px; max-width: 100%; height: auto;
    margin: 1.5rem auto; display: block;
    border: 1px solid #334155;
    box-shadow: 0 4px 24px rgba(0,0,0,.4);
  }

  .article-body table { width: 100%; border-collapse: collapse; margin: 1.25rem 0; font-size: .9rem; }
  .article-body th { background: #1e293b; color: #f1f5f9; padding: 10px 14px; text-align: left; font-weight: 600; border: 1px solid #334155; }
  .article-body td { border: 1px solid #334155; padding: 9px 14px; }
  .article-body tr:nth-child(even) td { background: rgba(15,23,42,.5); }

  /* inline code */
  .article-body :not(pre) > code {
    background: #1e293b; border: 1px solid #334155;
    border-radius: 5px; padding: 2px 6px;
    color: #f472b6; font-size: .88em; font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  /* ── Details / Summary (TUF collapsible sections) ─────────────────────────── */
  .article-body details {
    background: #0f172a; border: 1px solid #334155;
    border-radius: 12px; margin: 1.5rem 0; overflow: hidden;
  }
  .article-body details[open] { border-color: #3b82f6; }
  .article-body summary {
    padding: 1rem 1.25rem; cursor: pointer; user-select: none;
    font-weight: 600; color: #e2e8f0; font-size: .95rem;
    display: flex; align-items: center; gap: .5rem;
    list-style: none;
  }
  .article-body summary::-webkit-details-marker { display: none; }
  .article-body summary::before {
    content: '›'; font-size: 1.25rem; color: #3b82f6;
    transition: transform .2s; display: inline-block; width: 1rem;
  }
  .article-body details[open] > summary::before { transform: rotate(90deg); }
  .article-body details > summary svg { display: none; } /* hide TUF's SVG chevron */
  .article-body details > div:not(.code-tabs):not(.code-content) {
    padding: 1.25rem 1.5rem; color: #cbd5e1;
    border-top: 1px solid #1e293b;
  }

  /* ── Code sections ────────────────────────────────────────────────────────── */
  .code-tabs { background: #0f172a; }
  .lang-tabs-bar {
    display: flex; gap: 2px; padding: 10px 12px 0;
    background: #020617; border-bottom: 1px solid #1e293b;
  }
  .lang-tab {
    padding: 6px 14px; border-radius: 6px 6px 0 0; cursor: pointer;
    font-size: .78rem; font-weight: 600; font-family: monospace;
    color: #64748b; background: transparent; border: none; outline: none;
    border-bottom: 2px solid transparent; transition: all .15s;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .lang-tab:hover { color: #94a3b8; }
  .lang-tab.active {
    color: #60a5fa; border-bottom-color: #3b82f6; background: #0f172a;
  }

  .code-content { position: relative; }
  .code-block { display: none; }
  .code-block.dsa_article_code_active { display: flex !important; }

  /* line numbers column */
  .line-numbers.line-num {
    display: flex; flex-direction: column; align-items: flex-end;
    padding: 1.1rem .75rem 1.1rem .5rem;
    min-width: 42px; background: #020617;
    border-right: 1px solid #1e293b;
    user-select: none; flex-shrink: 0;
    color: #334155; font-size: .8rem; font-family: monospace;
    line-height: 1.6;
  }
  .line-numbers.line-num span { display: block; }

  .code-block pre {
    flex: 1; margin: 0; padding: 1.1rem 1.25rem;
    background: #020617 !important; overflow-x: auto;
    font-size: .83rem; line-height: 1.6; border-radius: 0;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  }
  .code-block pre code {
    background: transparent !important; padding: 0 !important;
    font-size: inherit; border: none;
  }

  /* hljs token colours */
  .hljs-keyword, .hljs-selector-tag { color: #c084fc; font-weight: 600; }
  .hljs-string, .hljs-attr         { color: #86efac; }
  .hljs-comment                    { color: #4b5563; font-style: italic; }
  .hljs-number, .hljs-literal      { color: #fb923c; }
  .hljs-title, .hljs-class__        { color: #60a5fa; }
  .hljs-type, .hljs-built_in       { color: #67e8f9; }
  .hljs-meta, .hljs-meta__keyword  { color: #94a3b8; }
  .hljs-params                     { color: #fde68a; }
  .hljs-function                   { color: #f8fafc; }
  .hljs-variable                   { color: #f1f5f9; }
</style>
